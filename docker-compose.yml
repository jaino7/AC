# docker-compose.yml

services:
  db:
    image: postgres:16-alpine  # PostgreSQLの公式イメージ（軽量版）
    restart: always
    environment:
      - POSTGRES_USER=myuser
      - POSTGRES_PASSWORD=mypassword
      - POSTGRES_DB=mydb
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
