<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Creatrix — Neon Dreams</title>
    <meta
      name="description"
      content="Creatrix — near-future creative hub with previews and supporter plans."
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: { primary: '#14b8a6' },
            boxShadow: { soft: '0 8px 24px -8px rgba(2, 6, 23, 0.15)' },
          },
        },
      };
    </script>
  </head>
  <body class="bg-white text-slate-900 antialiased">
    <a
      href="#main"
      class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-50 focus:rounded-lg focus:bg-white focus:px-4 focus:py-2 focus:shadow-lg focus:outline-none focus:ring-2 focus:ring-primary"
    >
      Skip to content
    </a>

    <div id="root"></div>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const Container = ({ children, as: As = 'div' }) => (
        <As className="mx-auto w-full max-w-6xl px-4 md:px-6 lg:px-8">{children}</As>
      );

      const Logo = ({ className = 'h-8 w-8' }) => (
        <svg
          className={className}
          viewBox="0 0 48 48"
          fill="none"
          role="img"
          aria-label="Creatrix logo"
        >
          <defs>
            <linearGradient id="grad" x1="0" x2="1" y1="0" y2="1">
              <stop offset="0%" stopColor="#14b8a6" />
              <stop offset="100%" stopColor="#0f766e" />
            </linearGradient>
          </defs>
          <circle cx="24" cy="24" r="22" stroke="url(#grad)" strokeWidth="4" />
          <path
            d="M31 18c-2-2.2-4.7-3.2-7.6-3.2-6.2 0-10.9 4.7-10.9 10.9s4.7 10.9 10.9 10.9c2.8 0 5.4-1.1 7.4-3.1"
            stroke="url(#grad)"
            strokeWidth="4"
            strokeLinecap="round"
          />
        </svg>
      );

      const Header = () => (
        <header className="border-b border-slate-200 bg-white">
          <Container as="nav">
            <div className="flex items-center justify-between py-4">
              <a href="#home" className="flex items-center gap-3">
                <Logo />
                <span className="text-lg font-semibold tracking-tight">Creatrix</span>
              </a>
              <ul className="hidden items-center gap-6 sm:flex" aria-label="Primary">
                <li>
                  <a
                    href="#home"
                    aria-current="page"
                    className="rounded text-sm font-semibold text-primary outline-none transition focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
                  >
                    Home
                  </a>
                </li>
                <li>
                  <a
                    href="#plans"
                    className="rounded text-sm text-slate-700 transition hover:text-slate-900 outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
                  >
                    Plans
                  </a>
                </li>
                <li>
                  <a
                    href="#content"
                    className="rounded text-sm text-slate-700 transition hover:text-slate-900 outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
                  >
                    Content
                  </a>
                </li>
                <li>
                  <a
                    href="#about"
                    className="rounded text-sm text-slate-700 transition hover:text-slate-900 outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
                  >
                    About
                  </a>
                </li>
              </ul>
            </div>
          </Container>
        </header>
      );

      const PlayOverlayButton = () => (
        <a
          href="#"
          aria-label="Play Neon Dreams: Chapter One"
          className="group absolute inset-0 grid place-items-center outline-none"
        >
          <span className="inline-flex h-16 w-16 items-center justify-center rounded-full bg-black/50 shadow-soft backdrop-blur transition hover:scale-105 focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-black/40">
            <svg
              aria-hidden="true"
              className="ml-0.5 h-6 w-6 text-white transition group-hover:scale-105"
              viewBox="0 0 24 24"
              fill="currentColor"
            >
              <path d="M8 5v14l11-7L8 5z" />
            </svg>
          </span>
        </a>
      );

      const ShareIcon = ({ type }) => {
        if (type === 'x') {
          return (
            <svg viewBox="0 0 24 24" className="h-5 w-5" fill="currentColor" aria-hidden="true">
              <path d="M18 2h3l-7.5 8.6L22 22h-6.9l-4.3-6-4.9 6H2l8.1-9.9L2 2h7l4 5.5L18 2Z" />
            </svg>
          );
        }
        if (type === 'link') {
          return (
            <svg viewBox="0 0 24 24" className="h-5 w-5" fill="currentColor" aria-hidden="true">
              <path d="M10.59 13.41a1 1 0 0 1 0-1.41l2-2a1 1 0 0 1 1.41 1.41l-2 2a1 1 0 0 1-1.41 0Z" />
              <path d="M9 17a5 5 0 0 1 0-10h2a1 1 0 0 1 0 2H9a3 3 0 0 0 0 6h2a1 1 0 0 1 0 2H9Zm6 0h-2a1 1 0 0 1 0-2h2a3 3 0 0 0 0-6h-2a1 1 0 0 1 0-2h2a5 5 0 0 1 0 10Z" />
            </svg>
          );
        }
        return (
          <svg viewBox="0 0 24 24" className="h-5 w-5" fill="currentColor" aria-hidden="true">
            <path d="M20 4H4a2 2 0 0 0-2 2v.35l10 6.25L22 6.35V6a2 2 0 0 0-2-2Zm2 7.12-9.4 5.87a1 1 0 0 1-1.2 0L2 11.12V18a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6.88Z"/>
          </svg>
        );
      };

      const Tag = ({ href = '#', children }) => (
        <a
          href={href}
          className="rounded text-sm font-medium text-primary hover:underline outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
        >
          {children}
        </a>
      );

      const UpgradeCard = () => (
        <aside aria-label="Upgrade" className="mb-8">
          <div className="rounded-2xl bg-white p-6 shadow-lg transition hover:shadow-xl">
            <h3 className="text-lg font-semibold tracking-tight">Upgrade Your Plan</h3>
            <p className="mt-1 text-slate-600">Unlock Exclusive Content!</p>
            <a
              href="#plans"
              className="mt-4 inline-flex w-full justify-center rounded-xl bg-primary px-4 py-2.5 text-sm font-semibold text-white shadow-lg transition hover:bg-teal-600 focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
            >
              Upgrade Plan
            </a>
            <ul className="mt-4 list-disc space-y-1 pl-5 text-sm text-slate-700">
              <li>All premium content</li>
              <li>Early releases</li>
              <li>Discord role</li>
            </ul>
          </div>
        </aside>
      );

      const VerticalRelated = () => (
        <aside aria-label="Related Content" className="mb-8">
          <h4 className="mb-3 text-sm font-semibold tracking-wide text-slate-700">Related Content</h4>
          <div className="space-y-4">
            {[
              {
                title: 'Emily updates — Basic mixtape',
                desc: 'Short free set of ambient sketches.',
                img: 'https://images.unsplash.com/photo-1511379938547-c1f69419868d?q=80&w=400',
                badge: 'Free Content',
                free: true,
              },
              {
                title: 'Major concept courses — Poster analysis',
                desc: 'Deconstructing neon poster layouts.',
                img: 'https://images.unsplash.com/photo-1496302662116-85c215f7c3b4?q=80&w=400',
                badge: 'Paid Content',
                free: false,
              },
            ].map((item, i) => (
              <article
                key={i}
                className="group relative flex overflow-hidden rounded-2xl bg-white p-3 shadow-lg transition hover:shadow-xl"
              >
                <div className="mr-3 h-20 w-28 min-w-[7rem] overflow-hidden rounded-xl bg-slate-100">
                  <img
                    src={item.img}
                    alt={`${item.title} thumbnail`}
                    className="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]"
                  />
                </div>
                <div className="min-w-0">
                  <h5 className="truncate text-sm font-semibold text-slate-900">{item.title}</h5>
                  <p className="mt-1 line-clamp-2 text-xs text-slate-600">{item.desc}</p>
                  <span
                    className={`pointer-events-none absolute bottom-3 right-3 rounded-full px-2 py-1 text-[10px] font-semibold ${
                      item.free ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'
                    }`}
                    aria-hidden="true"
                  >
                    {item.badge}
                  </span>
                </div>
              </article>
            ))}
          </div>
        </aside>
      );

      const HorizontalRelated = () => (
        <aside aria-label="Related Content">
          <h4 className="mb-3 text-sm font-semibold tracking-wide text-slate-700">Related Content</h4>
          <div className="grid grid-cols-2 gap-4">
            {[
              {
                title: 'Night Signals',
                img: 'https://images.unsplash.com/photo-1495567720989-cebdbdd97913?q=80&w=400',
              },
              {
                title: 'City Echoes',
                img: 'https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?q=80&w=400',
              },
            ].map((it, i) => (
              <article
                key={i}
                className="group overflow-hidden rounded-2xl bg-white shadow-lg transition hover:shadow-xl"
              >
                <div className="aspect-[4/3] w-full overflow-hidden">
                  <img
                    src={it.img}
                    alt={`${it.title} thumbnail`}
                    className="h-full w-full object-cover transition-transform duration-300 group-hover:scale-[1.03]"
                  />
                </div>
                <div className="p-3">
                  <h5 className="truncate text-sm font-semibold text-slate-900">{it.title}</h5>
                </div>
              </article>
            ))}
          </div>
        </aside>
      );

      const Article = () => (
        <article aria-labelledby="title" className="space-y-6">
          <div className="relative overflow-hidden rounded-2xl shadow-lg transition hover:shadow-xl">
            <div className="aspect-video w-full bg-slate-900">
              <img
                src="https://images.unsplash.com/photo-1508057198894-247b23fe5ade?q=80&w=1600"
                alt="Neon city skyline at night"
                className="h-full w-full object-cover"
              />
            </div>
            <div className="pointer-events-none absolute inset-0 bg-gradient-to-tr from-black/30 via-black/10 to-transparent"></div>
            <PlayOverlayButton />
          </div>

          <header>
            <h1 id="title" className="text-2xl font-bold tracking-tight sm:text-3xl">
              Neon Dreams: Chapter One
            </h1>
            <p className="mt-1 text-sm text-slate-500">Published: October 26, 2024</p>
          </header>

          <main className="space-y-4 text-slate-600">
            <p>
              In a city humming with electric whispers, the alleys glow in
              layered teal and violet. We trace the echoes of stories caught in
              rainy glass, where every light reflects a different possibility.
            </p>
            <p>
              This chapter collects fragments—sound, motion, and graphite
              outlines—stitched into a lucid rhythm. It’s an invitation to slow
              down, to notice, and to let your imagination unlock new corridors.
            </p>
          </main>

          <section aria-label="Tags">
            <ul className="flex flex-wrap gap-3">
              {['#Cyberpunk', '#Scifi', '#ConceptArt', '#Cocobrat', '#MonthlyHangout'].map((t) => (
                <li key={t}>
                  <Tag href="#">{t}</Tag>
                </li>
              ))}
            </ul>
          </section>

          <section aria-label="Share" className="pt-2">
            <div className="flex items-center gap-3">
              <a
                href="#"
                aria-label="Share on X"
                className="inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white p-2 text-slate-700 transition hover:text-primary hover:border-primary focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
              >
                <ShareIcon type="x" />
              </a>
              <a
                href="#"
                aria-label="Copy link"
                className="inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white p-2 text-slate-700 transition hover:text-primary hover:border-primary focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
              >
                <ShareIcon type="link" />
              </a>
              <a
                href="mailto:?subject=Neon%20Dreams&body=Check%20this%20out!"
                aria-label="Share via email"
                className="inline-flex items-center justify-center rounded-xl border border-slate-200 bg-white p-2 text-slate-700 transition hover:text-primary hover:border-primary focus:outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-white"
              >
                <ShareIcon type="mail" />
              </a>
            </div>
          </section>
        </article>
      );

      const Layout = () => (
        <main id="main" className="py-6 md:py-10">
          <Container>
            <div className="md:grid md:grid-cols-[2fr_1fr] md:gap-8">
              <Article />
              <div className="mt-8 md:mt-0">
                <UpgradeCard />
                <VerticalRelated />
                <HorizontalRelated />
              </div>
            </div>
          </Container>
        </main>
      );

      const Footer = () => (
        <footer className="bg-slate-800 text-slate-300">
          <Container>
            <div className="flex flex-col items-center justify-between gap-4 py-6 sm:flex-row">
              <nav aria-label="Footer" className="flex gap-5">
                <a
                  href="#"
                  className="rounded text-sm hover:text-white transition outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-slate-800"
                >
                  Terms of Service
                </a>
                <a
                  href="#"
                  className="rounded text-sm hover:text-white transition outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-slate-800"
                >
                  Privacy Policy
                </a>
                <a
                  href="#"
                  className="rounded text-sm hover:text-white transition outline-none focus-visible:ring-2 focus-visible:ring-primary focus-visible:ring-offset-2 focus-visible:ring-offset-slate-800"
                >
                  Contact
                </a>
              </nav>
              <p className="text-xs sm:text-sm">© 2024 Creatrix. All rights reserved.</p>
            </div>
          </Container>
        </footer>
      );

      const App = () => (
        <>
          <Header />
          <Layout />
          <Footer />
        </>
      );

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
