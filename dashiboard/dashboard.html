<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Creator Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            teal: {
              500: '#14b8a6'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <a href="#main" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 px-3 py-2 rounded-md bg-white shadow ring-2 ring-teal-500">メインコンテンツへスキップ</a>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script>
    const e = React.createElement;

    function Header() {
      return e(
        'header',
        { className: 'bg-white/90 backdrop-blur supports-[backdrop-filter]:bg-white/70 border-b border-slate-200', role: 'banner' },
        e(
          'div',
          { className: 'max-w-6xl mx-auto px-4 sm:px-6' },
          e(
            'nav',
            { className: 'flex items-center justify-between h-16', 'aria-label': 'Main navigation', role: 'navigation' },
            [
              e('div', { key: 'left', className: 'flex items-center gap-3' }, [
                e(
                  'div',
                  { key: 'logo', className: 'shrink-0' },
                  e(
                    'svg',
                    {
                      width: 36, height: 36, viewBox: '0 0 48 48', role: 'img',
                      'aria-label': 'Creatrix ロゴ',
                      className: 'rounded-full bg-teal-500 p-1 text-white shadow'
                    },
                    [
                      e('circle', { key: 'c', cx: 24, cy: 24, r: 22, fill: 'currentColor', opacity: 0.15 }),
                      e('text', { key: 't', x: 16, y: 31, fontSize: 22, fontWeight: 700, fill: 'currentColor' }, 'C')
                    ]
                  )
                ),
                e('div', { key: 'brand', className: 'flex flex-col leading-tight' }, [
                  e('span', { key: 'name', className: 'font-semibold text-slate-900' }, 'Neon Dreams Creator'),
                  e('span', { key: 'role', className: 'text-xs text-slate-500' }, 'Creator Dashboard')
                ])
              ]),
              e('div', { key: 'right', className: 'flex items-center gap-6' }, [
                e('ul', { key: 'menu', className: 'hidden md:flex items-center gap-6 text-sm font-medium' }, [
                  e('li', { key: 'nav1' },
                    e('a', {
                      href: '#',
                      'aria-current': 'page',
                      className: 'px-1 pb-1 border-b-2 border-teal-500 text-teal-600 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer'
                    }, 'Dashboard')
                  ),
                  e('li', { key: 'nav2' },
                    e('a', {
                      href: '#',
                      className: 'text-slate-600 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer'
                    }, 'Content')
                  ),
                  e('li', { key: 'nav3' },
                    e('a', {
                      href: '#',
                      className: 'text-slate-600 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer'
                    }, 'Subscriptions')
                  ),
                  e('li', { key: 'nav4' },
                    e('a', {
                      href: '#',
                      className: 'text-slate-600 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer'
                    }, 'Payments')
                  ),
                  e('li', { key: 'nav5' },
                    e('a', {
                      href: '#',
                      className: 'text-slate-600 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer'
                    }, 'Settings')
                  ),
                  e('li', { key: 'nav6' },
                    e('a', {
                      href: '#',
                      className: 'text-slate-600 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer'
                    }, 'Log Out')
                  )
                ]),
                e(
                  'button',
                  {
                    key: 'avatar',
                    type: 'button',
                    className: 'inline-flex items-center justify-center w-8 h-8 rounded-full bg-teal-500 text-white font-semibold text-xs shadow ring-1 ring-teal-400/40 hover:brightness-110 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 cursor-pointer',
                    'aria-label': 'アカウントメニュー'
                  },
                  'ND'
                )
              ])
            ]
          )
        )
      );
    }

    function SummaryCard({ title, value, sub, ctaText, ctaVariant, subLink }) {
      const ctaBase = 'inline-flex items-center gap-2 px-3 py-1.5 text-sm rounded-md focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 transition cursor-pointer';
      const ctaClass = ctaVariant === 'primary'
        ? ctaBase + ' bg-teal-600 text-white hover:bg-teal-700'
        : ctaBase + ' border border-teal-500 text-teal-600 hover:bg-teal-50';
      return e(
        'div',
        { className: 'rounded-2xl bg-white shadow-lg transition hover:shadow-xl p-6 focus-within:ring-2 focus-within:ring-teal-500' },
        [
          e('h3', { key: 'h', className: 'font-semibold text-slate-900' }, title),
          e('p', { key: 'v', className: 'mt-3 text-3xl font-semibold text-teal-600' }, value),
          sub ? e('p', { key: 's', className: 'mt-1 text-sm text-slate-500' }, sub) : null,
          e('div', { key: 'actions', className: 'mt-4 flex items-center gap-4' }, [
            ctaText ? e('button', { key: 'cta', type: 'button', className: ctaClass }, ctaText) : null,
            subLink ? e('a', {
              key: 'sublink',
              href: '#',
              className: 'text-sm text-teal-600 hover:text-teal-700 underline underline-offset-2 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer'
            }, subLink) : null
          ])
        ]
      );
    }

    function QuickActions() {
      const base = 'inline-flex items-center justify-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 cursor-pointer';
      return e(
        'section',
        { 'aria-labelledby': 'quick-actions', className: 'rounded-2xl bg-white shadow-lg transition hover:shadow-xl p-6' },
        [
          e('h2', { key: 'h', id: 'quick-actions', className: 'font-semibold text-slate-900' }, 'Quick Actions'),
          e('div', { key: 'btns', className: 'mt-4 flex flex-wrap gap-3' }, [
            e('button', { key: 'a1', type: 'button', className: base + ' bg-teal-600 text-white hover:bg-teal-700' }, 'Upload New Content'),
            e('button', { key: 'a2', type: 'button', className: base + ' border border-slate-300 bg-white text-slate-700 hover:bg-slate-50' }, 'Edit Subscription Plans'),
            e('button', { key: 'a3', type: 'button', className: base + ' border border-slate-300 bg-white text-slate-700 hover:bg-slate-50' }, 'Promote Latest Post'),
            e('button', { key: 'a4', type: 'button', className: base + ' border border-teal-500 text-teal-600 hover:bg-teal-50' }, 'View Reports')
          ])
        ]
      );
    }

    function UpgradeCard() {
      return e(
        'section',
        { 'aria-labelledby': 'upgrade', className: 'rounded-2xl bg-white shadow-lg transition hover:shadow-xl p-6' },
        [
          e('h2', { key: 'h', id: 'upgrade', className: 'font-semibold text-slate-900' }, 'Upgrade Your Plan'),
          e('p', { key: 'sub', className: 'mt-1 text-sm text-slate-500' }, 'Neon Dreams Creator'),
          e('p', { key: 'copy', className: 'mt-4 text-sm text-slate-600' }, 'Unlock advanced analytics, higher upload limits, and VIP support for your growing audience.'),
          e('div', { key: 'cta', className: 'mt-5' },
            e('button', {
              type: 'button',
              className: 'inline-flex items-center gap-2 px-4 py-2 rounded-md bg-teal-700 text-white text-sm font-medium hover:bg-teal-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 cursor-pointer'
            }, 'Upgrade Plan')
          )
        ]
      );
    }

    function StatusCard() {
      return e(
        'section',
        { 'aria-labelledby': 'status', className: 'rounded-2xl bg-white shadow-lg transition hover:shadow-xl p-6' },
        [
          e('h2', { key: 'h', id: 'status', className: 'font-semibold text-slate-900' }, 'Relevant Status'),
          e('p', { key: 'desc', className: 'mt-3 text-sm text-slate-600' }, 'Welcome! I’m a mix and storyteller exploring new worlds. Stay tuned for fresh drops and behind-the-scenes insights every week.'),
          e('div', { key: 'badges', className: 'mt-4 flex flex-wrap gap-2' }, [
            e('button', {
              key: 'b1', type: 'button',
              className: 'inline-flex items-center px-3 py-1 rounded-full bg-teal-50 text-teal-700 border border-teal-500 text-xs font-medium hover:bg-teal-100 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 cursor-pointer'
            }, 'Benchmark Price'),
            e('button', {
              key: 'b2', type: 'button',
              className: 'inline-flex items-center px-3 py-1 rounded-full bg-teal-600 text-white text-xs font-medium hover:bg-teal-700 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 cursor-pointer'
            }, 'Subscribe')
          ])
        ]
      );
    }

    function RecentActivity() {
      const items = [
        { id: 1, text: 'New Subscriber: @FanOfNeon (Basic plan)' },
        { id: 2, text: 'Keyword Q&A live session: "VJxper Cave (VIP)"' },
        { id: 3, text: 'New comment on "Neon Dreams: Chapter One"' }
      ];
      return e(
        'section',
        { 'aria-labelledby': 'recent', className: 'rounded-2xl bg-white shadow-lg transition hover:shadow-xl p-6' },
        [
          e('h2', { key: 'h', id: 'recent', className: 'font-semibold text-slate-900' }, 'Recent Activity'),
          e('ul', { key: 'list', className: 'mt-4 space-y-3' },
            items.map(item =>
              e('li', { key: item.id }, e('div', { className: 'rounded-lg bg-white shadow p-3 border border-slate-100' }, [
                e('p', { className: 'text-sm text-slate-700' }, item.text)
              ]))
            )
          )
        ]
      );
    }

    function MainContent() {
      return e(
        'main',
        { id: 'main', role: 'main', className: 'max-w-6xl mx-auto px-4 sm:px-6 py-10 md:py-12' },
        e(
          'div',
          { className: 'md:grid md:grid-cols-[2fr_1fr] md:gap-8' },
          [
            e('section', { key: 'maincol', 'aria-labelledby': 'overview', className: 'space-y-8' }, [
              e('div', { key: 'title', className: 'flex items-end justify-between' }, [
                e('h1', { className: 'text-2xl md:text-3xl font-semibold text-slate-900' }, 'Dashboard Overview')
              ]),
              e('div', { key: 'cards', className: 'grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6' }, [
                e(SummaryCard, { key: 'c1', title: 'Total Earnings', value: '$1,4500.75', sub: 'This Month', ctaText: 'View Reports', ctaVariant: 'outline' }),
                e(SummaryCard, { key: 'c2', title: 'Active Subscribers', value: '258', subLink: 'Manage Subscribers' }),
                e(SummaryCard, { key: 'c3', title: 'Content Status', value: '34 Published', subLink: 'Manage Content' })
              ]),
              e(QuickActions, { key: 'actions' })
            ]),
            e('aside', { key: 'aside', role: 'complementary', className: 'mt-10 md:mt-0 space-y-6' }, [
              e(UpgradeCard, { key: 'up' }),
              e(StatusCard, { key: 'st' }),
              e(RecentActivity, { key: 'ra' })
            ])
          ]
        )
      );
    }

    function Footer() {
      return e(
        'footer',
        { role: 'contentinfo', className: 'mt-10 md:mt-12 bg-slate-800 text-slate-300' },
        e('div', { className: 'max-w-6xl mx-auto px-4 sm:px-6 py-6' }, [
          e('div', { className: 'flex flex-col md:flex-row items-center justify-between gap-4' }, [
            e('nav', { 'aria-label': 'Footer links', className: 'flex items-center gap-6 text-sm', role: 'navigation' }, [
              e('a', { href: '#', className: 'hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer' }, 'Terms of Service'),
              e('a', { href: '#', className: 'hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer' }, 'Privacy Policy'),
              e('a', { href: '#', className: 'hover:text-white focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-teal-500 rounded-sm cursor-pointer' }, 'Contact')
            ]),
            e('p', { className: 'text-sm' }, '© 2024 Creatrix. All rights reserved.')
          ])
        ])
      );
    }

    function App() {
      return e(React.Fragment, null, [e(Header, { key: 'h' }), e(MainContent, { key: 'm' }), e(Footer, { key: 'f' })]);
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
